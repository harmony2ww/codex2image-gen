<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="docTitle">codex2image-gen Logs</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f5f7fb;
        --panel: #fff;
        --border: #dfe6f2;
        --muted: #5a6b85;
        --accent: #145dff;
        --sidebar-w: 280px;
      }
      * { box-sizing: border-box; }
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        background: var(--bg);
        color: #132238;
      }
      .shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }
      .topbar {
        flex-shrink: 0;
        padding: 20px 24px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .topbar-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .topbar-copy {
        min-width: 0;
        flex: 1;
      }
      .lang-switch {
        display: inline-flex;
        flex-shrink: 0;
        padding: 3px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f6f8fc;
        gap: 2px;
      }
      .lang-switch button {
        border: none;
        background: transparent;
        color: var(--muted);
        padding: 6px 12px;
        border-radius: 8px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        line-height: 1.2;
      }
      .lang-switch button:hover {
        color: #132238;
      }
      .lang-switch button.active {
        background: var(--panel);
        color: var(--accent);
        box-shadow: 0 1px 4px rgba(17, 34, 68, 0.08);
        font-weight: 600;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }
      .hint {
        color: var(--muted);
        font-size: 14px;
      }
      .layout {
        display: flex;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .sidebar-section.grow {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-bottom: none;
      }
      .sidebar-section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-section h2 {
        margin: 0 0 12px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .day-list {
        list-style: none;
        margin: 0;
        padding: 0;
        overflow: auto;
        flex: 1;
      }
      .day-item {
        margin-bottom: 6px;
      }
      .day-btn {
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        background: #f6f8fc;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font: inherit;
        color: inherit;
      }
      .day-btn:hover {
        border-color: #c8d2e1;
      }
      .day-btn.active {
        border-color: var(--accent);
        background: #edf3ff;
      }
      .day-btn .date {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .day-btn .meta {
        font-size: 12px;
        color: var(--muted);
      }
      .main {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }
      .main-scroll {
        flex: 1;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 20px 24px 40px;
        overscroll-behavior: contain;
      }
      .status {
        flex-shrink: 0;
        color: var(--muted);
        margin-bottom: 16px;
        font-size: 14px;
      }
      .stats-table-wrap {
        overflow: auto;
        max-height: 220px;
      }
      table.stats {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      table.stats th,
      table.stats td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      table.stats th {
        color: var(--muted);
        font-weight: 600;
        position: sticky;
        top: 0;
        background: var(--panel);
      }
      table.stats tr[data-day] {
        cursor: pointer;
      }
      table.stats tr[data-day]:hover,
      table.stats tr[data-day].active {
        background: #edf3ff;
      }
      table.stats td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .records {
        display: grid;
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(17, 34, 68, 0.06);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        margin-bottom: 10px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: #edf3ff;
        color: #2151b2;
        font-size: 13px;
      }
      .pill.fail {
        background: #fff1f1;
        color: #b42318;
      }
      .prompt {
        padding: 12px;
        background: #f6f8fc;
        border-radius: 12px;
        white-space: pre-wrap;
        margin: 12px 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
      }
      figure {
        margin: 0;
        padding: 10px;
        border: 1px solid #e1e8f3;
        border-radius: 12px;
        background: #fafcff;
      }
      img {
        width: 100%;
        height: 160px;
        object-fit: contain;
        background: #eef3fb;
        border-radius: 8px;
      }
      figcaption {
        margin-top: 8px;
        font-size: 12px;
        color: #4c5d77;
        word-break: break-all;
      }
      pre {
        margin: 12px 0 0;
        padding: 12px;
        background: #0f172a;
        color: #d6e2ff;
        border-radius: 12px;
        overflow: auto;
        font-size: 12px;
      }
      .empty {
        padding: 48px 24px;
        text-align: center;
        color: var(--muted);
        background: var(--panel);
        border: 1px dashed var(--border);
        border-radius: 16px;
      }
      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          max-height: 38vh;
          flex-shrink: 0;
        }
        .main {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-row">
          <div class="topbar-copy">
            <h1 data-i18n="heading">codex2image-gen Logs</h1>
            <div class="hint" data-i18n="subtitle">Daily summary on the left; select a day to view requests.</div>
          </div>
          <div class="lang-switch" id="langSwitch" role="group" data-i18n-aria="langSwitchAria">
            <button type="button" data-lang="zh" aria-pressed="false">中文</button>
            <button type="button" data-lang="en" aria-pressed="false">EN</button>
          </div>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <section class="sidebar-section">
            <h2 data-i18n="statsTitle">Overview</h2>
            <div class="stats-table-wrap">
              <table class="stats" id="statsTable">
                <thead>
                  <tr>
                    <th data-i18n="colDay">Day</th>
                    <th class="num" data-i18n="colTotal">Total</th>
                    <th class="num" data-i18n="colSuccess">OK</th>
                    <th class="num" data-i18n="colFailed">Fail</th>
                  </tr>
                </thead>
                <tbody id="statsBody"></tbody>
              </table>
            </div>
          </section>
          <section class="sidebar-section grow">
            <h2 data-i18n="daysTitle">By day</h2>
            <ul class="day-list" id="dayList"></ul>
          </section>
        </aside>

        <main class="main">
          <div class="main-scroll">
            <div id="status" class="status" data-i18n="statusLoading">Loading…</div>
            <div id="records" class="records"></div>
          </div>
        </main>
      </div>
    </div>

    <script>
      const MESSAGES = {
        en: {
          docTitle: "codex2image-gen Logs",
          heading: "codex2image-gen Logs",
          subtitle: "Overview and daily list load automatically. Select a day to view details.",
          statsTitle: "Overview",
          daysTitle: "By day",
          colDay: "Day",
          colTotal: "Total",
          colSuccess: "OK",
          colFailed: "Fail",
          dayMeta: "{total} req · {success} ok · {failed} fail",
          statusLoading: "Loading…",
          statusLoadingDay: "Loading {day}…",
          statusLoadedDay: "{day} · {count} record(s)",
          statusFailed: "Load failed: {message}",
          noDays: "No log files yet. Generate an image to create logs/YYYY-MM-DD.jsonl.",
          noRecords: "No records for this day.",
          success: "Success",
          failed: "Failed",
          prompt: "Prompt",
          error: "Error",
          referenceImages: "Reference images ({count})",
          outputImages: "Generated images ({count})",
          none: "None",
          langSwitchAria: "Language",
        },
        zh: {
          docTitle: "codex2image-gen 日志",
          heading: "codex2image-gen 日志",
          subtitle: "左侧为按日统计，自动加载；点击某一天查看该日请求详情。",
          statsTitle: "总览",
          daysTitle: "按日",
          colDay: "日期",
          colTotal: "总数",
          colSuccess: "成功",
          colFailed: "失败",
          dayMeta: "{total} 条 · 成功 {success} · 失败 {failed}",
          statusLoading: "加载中…",
          statusLoadingDay: "正在加载 {day}…",
          statusLoadedDay: "{day} · 共 {count} 条",
          statusFailed: "加载失败：{message}",
          noDays: "暂无日志。先生成一张图后会出现 logs/YYYY-MM-DD.jsonl。",
          noRecords: "该日暂无记录。",
          success: "成功",
          failed: "失败",
          prompt: "提示词",
          error: "错误",
          referenceImages: "参考图（{count}）",
          outputImages: "生成图（{count}）",
          none: "无",
          langSwitchAria: "语言",
        },
      };

      const LOCALE_STORAGE_KEY = "codex2image-gen.logs-viewer.locale";

      function detectBrowserLocale() {
        const langs = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || "en"];
        return langs.some((lang) => String(lang || "").toLowerCase().startsWith("zh")) ? "zh" : "en";
      }

      function resolveLocale() {
        try {
          const saved = localStorage.getItem(LOCALE_STORAGE_KEY);
          if (saved === "zh" || saved === "en") return saved;
        } catch {
          // ignore storage errors
        }
        return detectBrowserLocale();
      }

      let locale = resolveLocale();
      const t = (key, vars = {}) => {
        let text = MESSAGES[locale][key] || MESSAGES.en[key] || key;
        for (const [name, value] of Object.entries(vars)) {
          text = text.replaceAll(`{${name}}`, String(value));
        }
        return text;
      };

      function applyDocumentLocale() {
        document.documentElement.lang = locale === "zh" ? "zh-CN" : "en";
      }

      function applyStaticI18n() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (key) el.textContent = t(key);
        });
        document.querySelectorAll("[data-i18n-aria]").forEach((el) => {
          const key = el.getAttribute("data-i18n-aria");
          if (key) el.setAttribute("aria-label", t(key));
        });
        document.querySelector("title[data-i18n]").textContent = t("docTitle");
      }

      function updateLangButtons() {
        document.querySelectorAll("#langSwitch button[data-lang]").forEach((btn) => {
          const active = btn.getAttribute("data-lang") === locale;
          btn.classList.toggle("active", active);
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
      }

      function setLocale(nextLocale) {
        if (nextLocale !== "zh" && nextLocale !== "en") return;
        if (nextLocale === locale) return;
        locale = nextLocale;
        try {
          localStorage.setItem(LOCALE_STORAGE_KEY, locale);
        } catch {
          // ignore storage errors
        }
        applyDocumentLocale();
        applyStaticI18n();
        updateLangButtons();
        if (daySummaries.length) {
          renderDaySummaries();
          highlightSelectedDay();
        }
        if (lastRecords.length) {
          renderRecords();
          if (selectedDay) {
            statusEl.textContent = t("statusLoadedDay", { day: selectedDay, count: lastRecords.length });
          }
        } else if (!daySummaries.length) {
          statusEl.textContent = t("noDays");
          const empty = recordsEl.querySelector(".empty");
          if (empty) empty.textContent = t("noDays");
        }
      }

      document.querySelectorAll("#langSwitch button[data-lang]").forEach((btn) => {
        btn.addEventListener("click", () => {
          setLocale(btn.getAttribute("data-lang") || "en");
        });
      });

      applyDocumentLocale();
      applyStaticI18n();
      updateLangButtons();

      const statusEl = document.getElementById("status");
      const recordsEl = document.getElementById("records");
      const statsBodyEl = document.getElementById("statsBody");
      const dayListEl = document.getElementById("dayList");

      let daySummaries = [];
      let selectedDay = "";
      let lastRecords = [];

      async function bootstrap() {
        statusEl.textContent = t("statusLoading");
        try {
          const response = await fetch("/api/logs/days");
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload?.error?.message || `HTTP ${response.status}`);
          }
          daySummaries = Array.isArray(payload.data) ? payload.data : [];
          renderDaySummaries();
          if (!daySummaries.length) {
            statusEl.textContent = t("noDays");
            recordsEl.innerHTML = `<div class="empty">${escapeHtml(t("noDays"))}</div>`;
            return;
          }
          await selectDay(daySummaries[0].day);
        } catch (error) {
          statusEl.textContent = t("statusFailed", { message: error.message });
          recordsEl.innerHTML = "";
        }
      }

      function renderDaySummaries() {
        statsBodyEl.innerHTML = daySummaries.map((item) => `
          <tr data-day="${escapeAttr(item.day)}" class="${item.day === selectedDay ? "active" : ""}">
            <td>${escapeHtml(item.day)}</td>
            <td class="num">${item.total || 0}</td>
            <td class="num">${item.success || 0}</td>
            <td class="num">${item.failed || 0}</td>
          </tr>
        `).join("");

        statsBodyEl.querySelectorAll("tr[data-day]").forEach((row) => {
          row.addEventListener("click", () => {
            void selectDay(row.getAttribute("data-day") || "");
          });
        });

        dayListEl.innerHTML = daySummaries.map((item) => `
          <li class="day-item">
            <button type="button" class="day-btn ${item.day === selectedDay ? "active" : ""}" data-day="${escapeAttr(item.day)}">
              <span class="date">${escapeHtml(item.day)}</span>
              <span class="meta">${escapeHtml(t("dayMeta", {
                total: item.total || 0,
                success: item.success || 0,
                failed: item.failed || 0,
              }))}</span>
            </button>
          </li>
        `).join("");

        dayListEl.querySelectorAll(".day-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            void selectDay(btn.getAttribute("data-day") || "");
          });
        });
      }

      function highlightSelectedDay() {
        statsBodyEl.querySelectorAll("tr[data-day]").forEach((row) => {
          row.classList.toggle("active", row.getAttribute("data-day") === selectedDay);
        });
        dayListEl.querySelectorAll(".day-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.getAttribute("data-day") === selectedDay);
        });
      }

      async function selectDay(day) {
        if (!day) return;
        selectedDay = day;
        highlightSelectedDay();
        statusEl.textContent = t("statusLoadingDay", { day });
        recordsEl.innerHTML = "";

        try {
          const params = new URLSearchParams({ day, limit: "2000" });
          const response = await fetch(`/api/logs?${params.toString()}`);
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload?.error?.message || `HTTP ${response.status}`);
          }
          lastRecords = Array.isArray(payload.data) ? payload.data : [];
          statusEl.textContent = t("statusLoadedDay", { day, count: lastRecords.length });
          if (!lastRecords.length) {
            recordsEl.innerHTML = `<div class="empty">${escapeHtml(t("noRecords"))}</div>`;
            return;
          }
          renderRecords();
        } catch (error) {
          statusEl.textContent = t("statusFailed", { message: error.message });
          recordsEl.innerHTML = "";
        }
      }

      function renderRecords() {
        recordsEl.innerHTML = lastRecords.map((record) => renderRecord(record)).join("");
      }

      function renderRecord(record) {
        const successClass = record.success ? "" : "fail";
        return `
          <section class="card">
            <div class="row">
              <span class="pill ${successClass}">${record.success ? t("success") : t("failed")}</span>
              <span class="pill">${escapeHtml(record.endpoint || "")}</span>
              <span class="pill">${escapeHtml(record.created_at || "")}</span>
              <span class="pill">${escapeHtml(record.model || "")}</span>
            </div>
            <div><strong>${escapeHtml(t("prompt"))}</strong></div>
            <div class="prompt">${escapeHtml(record.prompt || "")}</div>
            ${record.error_message ? `<div><strong>${escapeHtml(t("error"))}</strong><div class="prompt">${escapeHtml(record.error_message)}</div></div>` : ""}
            <div><strong>${escapeHtml(t("referenceImages", { count: record.input_image_count || 0 }))}</strong></div>
            <div class="grid">${renderImages(record.input_images || [])}</div>
            <div style="margin-top:12px"><strong>${escapeHtml(t("outputImages", { count: record.output_image_count || 0 }))}</strong></div>
            <div class="grid">${renderImages(record.output_images || [])}</div>
            <pre>${escapeHtml(JSON.stringify(record.request_summary || {}, null, 2))}</pre>
          </section>
        `;
      }

      function renderImages(images) {
        if (!images.length) {
          return `<div class="hint">${escapeHtml(t("none"))}</div>`;
        }
        return images.map((image) => {
          const src = image.public_path || image.saved_path || "";
          return `
            <figure>
              <a href="${escapeAttr(src)}" target="_blank" rel="noreferrer">
                <img src="${escapeAttr(src)}" alt="" loading="lazy" />
              </a>
              <figcaption>${escapeHtml(src)}</figcaption>
            </figure>
          `;
        }).join("");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      void bootstrap();
    </script>
  </body>
</html>
